<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feijão com farinha</title>
    <style>
        /* O segredo da centralização está aqui */
        body {
            display: flex;          /* Transforma o body em um container flexível */
            flex-direction: column; /* Coloca o texto acima do vídeo */
            align-items: center;    /* Centraliza horizontalmente */
            justify-content: center; /* Centraliza verticalmente */
            min-height: 100vh;      /* Ocupa 100% da altura da tela do navegador */
            margin: 0;              /* Remove espaços extras nas bordas */
            background-color: #000000; /* Cor de fundo opcional apenas para contraste */
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 20px;    /* Dá um espaço entre o título e o vídeo */
        }
    </style>
</head>
<body>

    <h1>Feijão com farinha</h1>
    
    <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/fTsjwIoDXT0?si=VuXWptUpFaNUqMF4&amp;controls=0" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
    </iframe>

</body>
</html>
