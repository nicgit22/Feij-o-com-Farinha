<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feijão com farinha - Tela Toda</title>
    <style>
        /* Remove margens e garante que nada transborde da tela */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* O vídeo ocupa 100% da tela */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1; /* Fica na camada de baixo */
        }

        /* Estilo do título que vai sumir */
        h1 {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            z-index: 10; /* Fica na frente do vídeo */
            pointer-events: none; /* Deixa clicar no vídeo através do texto */
            
            /* Chamada da animação: Nome | Duração | Atraso | Tipo | Mantém o estado final */
            animation: sumirTexto 1s ease-in 4s forwards;
        }

        /* Regras da animação para esconder */
        @keyframes sumirTexto {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px); /* Sobe um pouquinho enquanto some */
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

    <h1>Feijão com farinha</h1>
    
    <iframe 
        src="https://www.youtube.com/embed/fTsjwIoDXT0?si=VuXWptUpFaNUqMF4&amp;autoplay=1&amp;mute=1" 
        title="YouTube video player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
    </iframe>

</body>
</html>
